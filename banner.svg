<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 180" width="760" height="180">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="760" height="180" fill="url(#bgGrad)" rx="8"/>
  <rect x="0" y="0" width="760" height="2" fill="url(#accent)" opacity="0.7"/>
  <rect x="0" y="178" width="760" height="2" fill="url(#accent)" opacity="0.4"/>

  <!-- Desktop/terminal with download arrow icon -->
  <g transform="translate(90, 88)" filter="url(#glow)">
    <!-- Monitor frame -->
    <rect x="-30" y="-35" width="60" height="42" rx="3" fill="none" stroke="#22d3ee" stroke-width="2"/>
    <!-- Screen content lines -->
    <line x1="-22" y1="-25" x2="-2" y2="-25" stroke="#22d3ee" stroke-width="1.5" opacity="0.4"/>
    <line x1="-22" y1="-18" x2="10" y2="-18" stroke="#22d3ee" stroke-width="1.5" opacity="0.3"/>
    <line x1="-22" y1="-11" x2="4" y2="-11" stroke="#22d3ee" stroke-width="1.5" opacity="0.4"/>
    <!-- Monitor stand -->
    <line x1="0" y1="7" x2="0" y2="18" stroke="#22d3ee" stroke-width="2"/>
    <line x1="-14" y1="18" x2="14" y2="18" stroke="#22d3ee" stroke-width="2" stroke-linecap="round"/>
    <!-- Download arrow overlay -->
    <line x1="15" y1="-28" x2="15" y2="-8" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <polyline points="9,-14 15,-8 21,-14" fill="none" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  </g>

  <!-- Accent divider -->
  <line x1="155" y1="40" x2="155" y2="145" stroke="#22d3ee" stroke-width="1" opacity="0.2"/>

  <!-- Title -->
  <text x="170" y="62" font-family="'Courier New', Courier, monospace" font-size="22" font-weight="bold" fill="#22d3ee" filter="url(#glow)">Claude-Desktop-Kali-Setup</text>

  <!-- Subtitle -->
  <text x="172" y="90" font-family="'Courier New', Courier, monospace" font-size="13" fill="#8b949e">One-Command AI Desktop Installer for Linux</text>

  <!-- Description -->
  <text x="172" y="115" font-family="'Courier New', Courier, monospace" font-size="11" fill="#484f58">APT repo + GPG keys  ·  MCP server config  ·  Kali / Debian / Ubuntu</text>

  <!-- Badges -->
  <g font-family="'Courier New', Courier, monospace" font-size="9.5" font-weight="700">
    <rect x="172" y="128" width="42" height="16" rx="3" fill="#1f2937" stroke="#374151" stroke-width="1"/>
    <text x="193" y="140" fill="#22d3ee" text-anchor="middle">bash</text>
    <rect x="220" y="128" width="62" height="16" rx="3" fill="#1f2937" stroke="#374151" stroke-width="1"/>
    <text x="251" y="140" fill="#6b7280" text-anchor="middle">installer</text>
    <rect x="288" y="128" width="36" height="16" rx="3" fill="#1f2937" stroke="#374151" stroke-width="1"/>
    <text x="306" y="140" fill="#6b7280" text-anchor="middle">MCP</text>
  </g>

  <!-- Author -->
  <text x="172" y="166" font-family="'Courier New', Courier, monospace" font-size="11" fill="#484f58">SkyzFallin</text>
</svg>
